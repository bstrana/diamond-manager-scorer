server {
    listen 8000;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https:; frame-src __KC_ORIGIN__; frame-ancestors 'self';" always;

    # ── Health check (Cloudron) ───────────────────────────────────────────────
    # Returns 200 directly from nginx so the health check works even while
    # node.js is still starting up.
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ── PocketBase API + realtime SSE ─────────────────────────────────────────
    # Browser JS talks to https://APP_DOMAIN/_pb/... which proxies here.
    location /_pb/ {
        proxy_pass         http://127.0.0.1:8090/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # PocketBase SSE (realtime subscriptions)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;

        # Tell any upstream proxy (e.g. Cloudron's outer nginx) not to buffer
        # this response — required for SSE (text/event-stream) to work.
        add_header X-Accel-Buffering "no" always;

        # Never gzip /_pb responses; gzip breaks SSE streams.
        gzip off;
    }

    # ── All other requests → node.js ─────────────────────────────────────────
    # node.js serves the SPA and injects window.__ENV__ into every HTML
    # response at request time, so nginx must proxy here rather than serve
    # the dist/ directory statically.
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Connection        '';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
